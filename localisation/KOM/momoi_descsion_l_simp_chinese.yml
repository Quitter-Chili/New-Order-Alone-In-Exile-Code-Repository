 momoi_condition:0 "科米政治动荡-才羽桃井"
 momoi_condition_desc:0 "\n\n\n   £GFX_decision_momoi_condition\n\n\n\n\n\n§W当前准备度最高派系为:§![TheMostReadyParty]\n§C才羽桃井§!§W当前精神状况为:§![MomoiMentalCondition]\n\n§j右派§!§W准备度:§!§Y[?KOM_right_ready]%§!\n§B中间派§!§W准备度:§!§Y[?KOM_center_ready]%§!\n§x左派§!§W准备度:§!§Y[?KOM_left_ready]%§!\n§C才羽桃井自我§!§W准备度:§!§Y[?KOM_self_ready]%§!\n\n§W------------------------------------------------------------------------------§!\n\n§C才羽桃井§!§W的到来是一场意外。§!\n§W尽管§!§P沃兹涅先斯基§!§W和§!§R日丹诺夫§!§W尝试将§!§C才羽桃井§!§W隐瞒，她的存在一定会暴露，我们必须做好准备§!\n\n§W------------------------------------------------------------------------------§!\n\n§j右派§!\n§j右派§!§W的激进思想让他们难以得到§!§C才羽桃井§!§W，一旦他们得知她的存在，这位女孩子的力量肯定让他们垂涎。既然得不到，他们会尝试将§!§C才羽桃井§!§W从这个世界上抹除,以防止他们的政敌拥有这个强大的不定数。§!§C才羽桃井§!§W的光环让她难以被枪杀。但是，§!§j右派§!§W完全可以利用这个女孩脆弱的神经，将她的心理防线击穿。又或者，可以动用一些生物化学手段……\n\n§W------------------------------------------------------------------------------§!\n\n§B中间派§!\n§B中间派§!§W的§!§P沃兹涅先斯基§!§W是和§!§R日丹诺夫§!§W几乎同时得知§C才羽桃井§!§W的存在。他的确将§!§C才羽桃井§!§W放给了§!§R日丹诺夫§!§W,还了他人情。但他的盟友们可是不会善罢甘休的。特别是§x“钢铁之人”§!§W之女§!§g斯大林娜§!§W,她或许会动用一切手段将§!§C才羽桃井§!§W夺到手中……\n§x不惜一切代价……§!§!\n\n§W------------------------------------------------------------------------------\n\n§!§x左派§!\n§x左派§!§W,也就是§!§R日丹诺夫§!§W和§!§x苏斯洛夫§!§W等同志所领导的派系。我们必须尽可能的将这位女孩保持在自己的手中。她可以成为我们派系的最大底牌，也可以成为我们一统祖国，收复东欧失地，为俄§!§z罗§!§x斯§!§W母亲一雪前耻，甚至是探索§!§x神秘未知科学§!§W的强大助推力。§!\n§x一切权力归苏维埃！§!\n\n§W------------------------------------------------------------------------------§!\n\n§C自我§!\n§W但是，§!§C才羽桃井§!§W即使成为三派争夺的人物，她也是人。至少在她的世界，她只是个天真开朗的普通人，一个高一的学生，她有自己的自我意识，她不想被这你虞我诈的政治乱流吹得七歪八扭，她唯一的目的就是回家，回到她那温暖舒适的小活动室，和她最心爱的三个至亲，和她那所信任的§!§M大人§!§W在一起……这是一定会的……§!\n§x一定会吗……？§!"
