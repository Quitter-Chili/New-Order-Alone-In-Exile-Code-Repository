 momoi.1.t:0 "长夜漫漫,星辰辉光"
 momoi.1.d:0 "1962年1月,西俄罗斯的大地上仍然在国防军铁靴的蹂躏下苟延残喘，五年前西俄罗斯战争失败后德国人施加给俄罗斯母亲的阴霾仍然笼罩着这片苦痛之地。\n\n大雪封盖了阿列克谢回家的路，就像是笼罩祖国的阴霾一样。阿列克谢在战前只是一位平平无奇但还算过得不错的工人，而德国人来后，这一切都毁了。故乡被摧毁，亲人在战乱中分离，似乎没有什么事能比这更糟糕了。\n\n“真见鬼，又是一场大雪！”阿列克谢放下背上那头刚捕来的鹿以及他那杆锈迹斑斑的猎枪，疲惫的靠在一棵树下。突然，天空传来一声巨响，阿列克谢顿时神经紧绷：“该死的，是德国佬的飞机又来了吗？”\n\n阿列克谢迅速躺下身，试图把自己藏在树林的阴影里。他躺在地上，发现天上并没有出现他所认为的威胁，反而只是划过了一道粉红色的流星。阿列克谢盯着那流星，心里舒缓了不少。或许，这是上天降下的祈福，暗示着美好的日子即将来临吧。他双手合十，眼睛仍不离那流星半点，许下了一个平凡的愿望："
 momoi.1.a:0 "愿亲爱的家乡美好……"
 momoi.1.tt:0 "§R新秩序§!在一抹§C粉色的不定色§!之下终会迎来§Y希望§!\n§W俄§!§z罗§!§x斯§!母亲终会迎来§x解放§!……"
 momoi.2.t:0 "不速之客"
 momoi.2.tt:0 "§Y从§!§M基沃托斯§!§Y到§!§W俄§!§z罗§!§x斯§!\n§Y从北德维纳到瑟克特夫卡尔§!\n§C她§!§Y的§R旅程§!§Y就此开始……§!\n§Y或§!§W归乡§!\n§Y或§!§z救赎§!\n§Y或§!§x死亡§!\n§C一切看她自己了§!"
 momoi.2.d:0 "“咳咳，咳咳，老……老师！救……”一个亚洲面孔女孩在陌生的的雪堆中醒来，而她就是那颗从空中划过的“流星”。所幸昨夜的大雪覆盖了北德维纳河中上游，她即使是从万米高空坠落，也没有受多大的伤。她瘫在雪堆里，刺骨的寒冷从她光着的双腿传到全身，将她从昏迷中拉了回来。\n\n她叫才羽桃井，本是另一个世界的女高中生，却因为某种因素来到了这片饱受折磨的土地。她站起身来，裹紧衣服，用力的搓着大腿根部让自己保持温暖。这是她平生第一次规整的穿着那紧实的、温暖的校服。按她的想法，她现在就像是在玩一场没有联机模式的单人生存游戏……\n\n想到这，才羽只想赶快的离开这个是非之地，在她想，她还在她的世界，还在她那乌托邦般的世界，自己只是莫名奇妙的来到那个世界的一个叫“红冬”的学院。她想找到那里的事务局，然后让她们把自己送回自己该在的地方，回去和自己的至亲们好好的玩她们最爱的游戏。可现实很残酷，这里不是那个“红冬”，而是比那里地狱上万千倍的俄罗斯，饱经风霜的俄罗斯。\n\n她迷茫地朝着雪堆旁的一条小径走去，漫无目的地向前走去。"
 momoi.2.a:0 "可随之而来的，是绝望……"
 momoi.3.t:0 "德国空军的骇人轰炸"
 momoi.3.d:0 "太阳升起来了，黎明的辉光照映掩盖着无数俄罗斯人鲜血的白雪地，反射的光芒刺痛了阿尔伯特·霍夫曼的眼睛。他开始了今天早晨的轰炸训练，不用虚假的训练道具，而是鲜活的斯拉夫人。他的飞机从维特尔出发，径直向东飞过莫斯科专员辖区，直达西俄罗斯\n\n随着飞机愈发的深入西俄罗斯的土地，霍夫曼也变得更加谨慎。现在已经是黎明，能见度并不低，他需要随时提防着俄罗斯各大军阀的防空设施，以及那群令所有德国轰炸机飞行员闻风丧胆的“暗夜魔女”。曾经霍夫曼的一位陪他度过了整个西俄罗斯战争的朋友就栽在了她们的手上，因此霍夫曼也对这些“斯拉夫贱畜”恨得咬牙切齿。\n\n他的飞机顺着北德维纳河一路向东，离他的目的地，科米共和国的瑟克特夫卡尔越来越近。他谨慎的盯着地表，以防树林里藏有防空阵地，忽然，他发现积雪反射出的光芒中竟有一丝丝粉红。好奇心驱使他看得更加仔细，他竟然发现了一个身着奇装异服的女孩，那丝粉红色的光芒正是从她头顶的“光环”反射而来。\n\n“天……天使！？”霍夫曼脑海中蹦出这个奇怪的想法，随即又摇摇头：“不对，这不可能，天使不可能眷顾这些劣等的斯拉夫民族呢？”想到这，他下定决心要消灭这个“伪天使”，于是向那粉红色的目标俯冲而去。\n\n那“伪天使”察觉到了这一点，她抬起头向上看，看见一架近距支援机正向她飞来,她并没有规避，而是呆呆地站在原地。机枪的子弹迅速的倾泻在她身上，扬起了一片白净的雪雾。霍夫曼迅速抬升飞机，准备离开，却察觉到了一丝不对劲。\n\n“等等……刚才的雪雾……好像没有血色”\n\n他刚准备调转机身，准备回去再次射击，数十颗子弹就贯穿了机身和他的胸膛，血液溅满了整个驾驶舱。"
 momoi.3.a:0 "白昼也有魔女……"
 momoi.4.t:0 "轰鸣"
 momoi.4.d:0 "才羽仍然呆呆地站在原地，刚才那是一种他从未见过的飞行器，直升机的桨叶被装在了像是一只鸟似的东西上面。她并没有思考多久，便准备上前去一探究竟，毕竟飞行器是需要人驾驶的，而偏偏现在，她最需要找到那可贵的人来解答她的疑惑。残骸发出的黑烟离她越来越近，而她却没有看见半点人影。\n\n“你还好吗——？”才羽用她稚嫩的声音呼唤着\n\n但回应她的只有那寒风呼过的声音。才羽哆嗦着踏过薄薄的冰面，走向那飞机的遗骸处，想要把它的驾驶员找出来。等到靠近了，她发现飞机已经将冰层砸出一个大窟窿，边缘的冰也在飞机残骸的燃烧下慢慢融化。\n\n俄罗斯的寒风让才羽桃井的鼻腔十分干燥，但她还是闻到了一丝诡异的气味……像是工程部机油的燃烧，又混合了烤焦了的肉味……\n\n她用枪托砸开了飞机舱盖的玻璃，看到了她那一辈子都无法忘掉的画面————黑色而干燥的表面透露出些许属于肌肉组织的猩红，其中的白骨若隐若现，尸骸的四条肢体以诡异的形式扭曲折叠，头骨死死地用视神经抓着那半突的眼球……\n\n而且他的头上没有光环\n\n才羽桃井下意识地先后退了几步摔倒在冰层上，电信号在她脑中轰鸣，粉色的瞳孔紧缩，胃液在肚子里翻江倒海，都快把前一晚的晚饭吐出来了。她目光呆滞，口中念念有词\n\n“我杀人了……”\n\n“我杀人了……”\n\n这四个字一直在她脑海里轰鸣....."
 momoi.4.a:0 "§x我杀人了……§!"
 momoi.4.tt:0 "§C才羽桃井§!§x的精神状况正在崩溃……§!"
 momoi.5.t:0 "1962年1月1日北德维纳中段地区轰炸预警报告"
 momoi.5.d:0 "报告瑟克特夫卡尔中央:\n\n今日凌晨观测到一架德国近距支援机飞入北德维纳河上空，预计是想对共和国地区进行轰炸。然而，在北德维纳河中段2号报告站附近约4公里的森林上空，其突然向下俯冲射击，随后爬升，在射击结束约2秒后被数支粉红色光束贯穿，随后坠向结冰的湖面，发射光束的未知单位在不久后向坠机区域移动。\n\n经过我方观测，击落该德军近距支援机的未知单位为女性，身高约1.40米至1.50米左右，黄发，亚洲面孔，穿着白黑粉相间的外套，戴有猫耳形头饰。最令我们不解的是，该单位头上悬有粉红色的发光光环。部分信教的侦察队队员甚至以为是天主派遣了天使来拯救苦痛之中的俄罗斯母亲，双手合十祈祷，但是这位“天使”过于前卫的穿着让我们打消了这一观点。\n\n根据观察，尽管该单位所使用步枪有着玩具般极其鲜艳的涂装，但仍具有令我们诧异的扇形扫射杀伤能力。经一名队员指出，那是大日耳曼国所生产的G3A3型自动步枪，故并不排除该单位的到来为外国渗透的可能性。\n\n我们请求中央派遣离北德维纳河中段2号报告站最近的作战小队前来支援，我们并不清楚该单位是否对我们存在敌意，但是绝不能让她落入西俄罗斯革命阵线的那帮赤匪手中。\n\n等待中央指示,\n共和国万岁！\n\n阿列克谢耶维奇·米哈伊尔\n北德维纳河中段2号报告站最高负责人\n1962年1月6日"
 momoi.5.a:0 "批准行动，务必小心行事"
 momoi.5.tt:0 "§B中间派开始行动了……§!\n§Y解锁关于§!§C才羽桃井§!§Y的新决议组§!"
 momoi.6.t:0 "漆黑的枪口"
 momoi.6.d:0 "迷茫，恐惧，无助。\n\n不过2个小时，一个才高一的女孩便经历了如此之多。笼罩俄罗斯大地的新秩序也已经将才羽桃井给覆盖，将她为数不多的理智渐渐击破。“老师……老师……老师……”她跪倒在原地，不断的呼唤她渴望能依靠的那个人，她多想再见到他，那个能帮她解决一切困难的，可靠的大人。但是现在，一切都不再了，她的苦难没有人帮她分担了，一切的艰难都需要她一个人克服。\n\n“老师……柚子……妹妹……爱丽丝，你……你们在哪里啊……”少女的嘴呢喃着，一向活泼开朗的她终竟是被新秩序的一巴掌给扇出了泪水，扇破了自信。泪水缓缓滴落，滴入冻土中，混入无人知晓的万千雪花中。\n\n草丛的窸窸窣窣和愈发靠近的脚步声再次挑起少女已经脆弱的神经。“谁在那！”她下意识地端起枪，她不想再被子弹击打了。然而，科米共和国的士兵们可没给她机会。一枪，击中了她的手，突击步枪落地。第二枪，击中她的头，她由于疼痛，由于惊吓，一屁股坐在了雪堆上，只能不甘心、茫然、恐惧的望向士兵们，她没有勇气再拿起枪开枪了。\n\n“控制住她，快！”\n\n“你……你们……不要过来！不要过来！！！”泪水从她眼角飞出，嘶哑地吼声盖过了一切。她面对一个个黑漆漆的枪口对准她，靠近她，只能拼尽力气地用腿往后一点点的挪动，不停地嘶吼，流泪\n\n“为什么要来这里……为什么要碰那个游戏机……为什么！命运为何如此不公！为什么要让我经历这些！为什……”\n\n桃井眼前一黑，随即倒下。米哈伊尔收回砸向桃井头上的枪托，看着枪托已断裂，心里一阵后怕，随后耸耸肩。"
 momoi.6.a:0 "抱歉，女士，我们听不懂您在说什么"
 momoi.6.tt:0 "§x左派似乎有所察觉……§!"
 KOM_get_momoi:0 "答应日丹诺夫的要求"
 momoi.8.t:0 "长夜漫漫，星火余烬"
 momoi.8.d:0 "伊万和尤里端着枪驻守在乌赫塔的边境站，那是阵线与那群科米叛徒的重要交界处。在西俄罗斯战争期间，沃兹涅先斯基带领着一帮可恶的叛徒在瑟克特夫卡尔建立了一个所谓“民主”的共和国，无耻地背叛了苏维埃祖国，背叛了革命。\n\n伊万疲倦地打了个哈欠，他的手被那恶劣的天气冻得绯红，身子还不停的打着寒颤。为了让身子暖和些，他颤抖着从荷包里抽出一根香烟，刚想擦一根火柴点燃，却一不小心把香烟掉到了厚厚的积雪里。\n\n“真该死!这都是那帮傻逼德国佬害的！如果不是他们，我们还会像这样在这里挨冻挨饿挨轰炸吗？！”伊万突然暴怒起来，在这种地狱中，烟草可是稀缺物品，军队每个月才能分到几根抽也抽不到两口的短烟，他用力把枪托往身前的石柱上砸去，却不小心反弹回来磕到了自己的脑袋。尤里作为伊万的长官，看到他如此分心，于是从边防站的另一方大步流星地走了过来，劈头盖脸地骂了伊万一顿，而伊万只是低着脑袋，嘴里时不时冷笑两声。\n\n“同志，请你……”\n\n尤里的话还半掩在嘴里，在不远处天空就传来一阵巨响。“该死的，肯定是德国佬的飞机又来了！”伊万迅速趴下身，就像平时那样，想把自己融入那积雪之中，而尤里却抓住了他的衣领，把手指指向那科米共和国境内的上空：\n\n“冷静，伊万同志，那只是一颗流星。”\n\n伊万站起身，拍了拍身上的积雪，向尤里所指方向看去，只见一颗明亮的粉色流星缓缓地从天边划过。伊万和尤里忘了神，尤里也不再继续训斥伊万，伊万也不再顶撞尤里，两人只是默契的把手捧在心口，同时许下了一个共同的、平凡的愿望："
 momoi.8.a:0 "愿祖国万年长……"
 momoi.8.tt:0 "§W俄§!§z罗§!§x斯§!母亲在饱经§R新秩序§!的折磨后奄奄一息\n而§x他们§!正在老去，§x革命阵线§!的未来岌岌可危\n但相信§x亲爱的祖国§!会在这丝§C粉红的不定色§!下迎来§Y希望§!\n\n§x一切权力归苏维埃！§!"
 momoi.7.t:0 "截胡"
 momoi.7.d:0 "日丹诺夫坐在办公室里饶有兴致地翻看着来自科米各地的报告。科米左翼的力量在暗中遍布全共和国，凭靠着左派的情报组织，日丹诺夫自然有能力知道全国各地的情报。前提是苏斯洛夫没有抓住他的把柄，或者那位来自中间派的老朋友仍然会在暗中还他点人情……\n\n忽然，日丹诺夫被一篇关于北部观察站的报告吸引了眼球。那位左翼成员表示，北德维纳河出现了一位奇怪的女孩，其能够硬抗下德军支援机涛涛的机枪子弹并且还能将其击落，并且在她的头上悬浮着奇怪的光环。那光环的颜色同昨夜观察到的那颗诡异的粉色流星巧合地相似。\n\n外星人？未来穿越者？天使？无数的猜想在日丹诺夫的脑子里漂浮着。无数的猜想转变为好奇，尽管他那唯物主义的理念让他起了疑心，但他也相信那群报告站的年轻人们是绝对不会说谎的。\n\n日丹诺夫通过办公桌旁的窗再次望向星河。好奇自古是人类的本能，地球是人类的摇篮，但人类不能被限制在地球，遥远的星空才是人类的归宿。或许，这位奇怪的女孩可以解开更多当下人类不解的奥秘，让他那宏伟的计划更早的实现……\n\n想到这，日丹诺夫嘴角扬了起来。想必他的老朋友早就收到了这个报告。或许，是时候让他还个人情了。\n\n他拨打了一通电话。随着电话对面接通，日丹诺夫讲到："
 momoi.7.a:0 "您好，沃兹涅先斯基同志……"
 momoi.7.tt:0 "§R日丹诺夫§!§Y心中有了计划§!"
 momoi.9.t:0 "科米共和国"
 momoi.9.d:0 "卡车从土路逐步驶上了共和国境内为数不多的公路。这条公路还是苏联时期留下的。才羽桃井在半路渐渐醒来，发现自己被五花大绑着。不过嘛，衣服完整、胖次完整、没有奇怪的感觉。只能庆幸，派来的部队军纪良好。\n\n米哈伊尔发现才羽桃井醒了过来，也注意到那消失的光环重新亮起。他一下便明白，那个光环可能是她身上一切神秘的根源。其他的小队成员也发现桃井醒来，对这个亚洲面孔的可爱女生产生了兴趣，时不时戳戳才羽桃的脸蛋，摸摸耳机。有几位还尝试抓住光环，可那光环好像长了眼睛似的，总是能从他们手中溜走。在几个队员用手臂组成天罗地网尝试围住那个光环时，他们绝望地发现那光环其实是可以穿过的，几个脾气略暴躁的大喊“Cyka！”。这滑稽样终于是让才羽桃井在新秩序下找到了点乐子，释放起了本性，像个傻子一样笑起来。还对几个戳她脸蛋的队员喊出“苦呀西……苦呀西！”。当然，斯拉夫人听不懂日语，但这可爱的叫声只能让他们戳得更起劲。\n\n“注意一点，前面就是瑟克特夫卡尔了。”米哈伊尔提醒道。队员门立刻从才羽桃井身边回到座位上坐端正，拿好枪。桃井也发现了，周围的建筑物越来越多，当然，地上像是被什么炸出来的大坑也越来越多。\n\n车停下来，才羽桃井被松了绑，当然，枪还被米哈伊尔保管着。士兵们要求她下车，她只好照做跳下了车，双脚刚落地她就看见一个脸部略圆、留八字胡、五官粗犷的大人。那大人看见他，便微笑了起来。那大人身边的一名行政人员对小桃用带有俄罗斯口音的日语说道："
 momoi.9.a:0 "女士您好，日丹诺夫先生欢迎您来到瑟克特夫卡尔。"
 momoi.10.t:0 "闹剧终已"
 momoi.11.t:0 "对话（1）"
 momoi.11.d:0 "日丹诺夫的办公室内一片肃静。\n\n桃井注视着眼前的大人，稍有些坐立难安。这位大人给她了一种威严而又亲切的感觉，她能猜得出来，眼前的大人别有目的。她并不反感大人，和老师在基沃托斯的相处让她哪怕面对大人也有一些松弛。但在当她注视着面前这位先生略微滑稽的圆脸和与基沃托斯人完全不同的五官比例后，她“噗”地一声笑了出来。\n\n好像是想到了什么，随后她便立刻捂住了嘴，低下头，害怕眼前的大人训斥她。\n\n日丹诺夫倒是找到了打破沉默的机会：\n\n“没事，小同志，我只是来咨询您一些事情，”他摆了摆手，“当您击落那架飞机的时候，我们就已经注意到您了”“我，我，我不是故意的，我我我原来不想杀人……”她瞬间神色慌张，恐怖的场景再次袭来。“不不，我不是这个意思”他摇了摇头，“那架飞机是敌人的，相反我们应该感谢您。”桃井楞了一下，很快就得出结论：“就像……击杀隐藏魔物，拯救了一个村庄，得到了盟友的剧情！对吧！”桃井的眼睛里瞬间有了光亮，翻译员和日丹诺夫却被搞的云里雾里的。总之，貌似以一种奇怪的方式建立起信任了……吧？\n\n但很快，日丹诺夫便伸出了手：“我先自我介绍一下，我叫日丹诺夫，安德烈·亚历山德罗维奇·日丹诺夫。科米共产党的领导人之一。”桃井犹豫了一下，握住了那只沧桑的手。"
 momoi.11.a:0 "你好，我叫才羽桃井"
 momoi.12.t:0 "对话（2）"
 momoi.12.d:0 "“届时，您将获得科米共和国合法的公民身份。”日丹诺夫向桃井保证道。\n\n“也就是说，只要我答应你们，成为你们的军事顾问，把我的枪交给你们研究，每隔一周来体检一次，就可以在这里自由生活是吗？就像……只要加入了城市的公会，就可以通过完成任务获得生活的保障一样对吧！”然而这群来自二十世纪贫困潦倒的俄罗斯地区的可怜人还是不明白她的比喻。\n\n“天呐，她到底在讲些什么……”日丹诺夫心想，但他还是点点头回应了桃井，没有过多问。“只要您照做，我们能保证您的生活不成问题。”\n\n“还有，下次有德军飞机来轰炸的时候，我们会提前通知您，我们需要您的枪支的实战数据以便仿制……”\n\n“啊？我还要去打打打打……”那具尸体的模样又被翻了出来，她的身体猛烈颤抖起来，她抱着头，嘴里喃喃着，似乎在胡言乱语……\n\n日丹诺夫只是看着，他也推断出，这个姑娘绝对没杀过人，她生活的地方也绝对没怎么死过人，总之是有别于这片充满杀戮和死亡的悲惨土地\n\n当她缓过来之后，日丹诺夫正在翻看着一沓文件：“缓过来了？那…鉴于你的年龄，我们判断您并没有独立生存的能力，瑟克特夫卡尔城区内的空闲房屋多数也被炸毁，所以，我们从城内行为良好的居民中挑选了一个，与您同居。”日丹诺夫抬起头来："
 momoi.12.a:0 "他叫尼古拉·谢苗诺维奇·卡尔达舍夫"
 momoi.13.t:0 "新家(1)"
 momoi.13.d:0 "才羽桃井站在一栋科米的公寓前。听那两位护送她的专人说，这一整栋房子都是卡尔达舍夫的。这位天文学和社会学爱好者的大多亲人们死于东逃时的轰炸……尽管她明白，公寓里住的是一位道德良好的公民，并且提前收到她到来的通知，但是凭借她的游戏经验来看，有这样剧情的人通常不是大反派就是勇者。她打心里希望是后者。\n\n怀着忐忑不安的心，她按响了门铃。但随着门缓缓打开，她看到了陌生却熟悉的人影。她呆楞住了。那道身影在桃井的眼前忽隐忽现，和眼前的人几乎重叠。熟悉的气质，熟悉的身高，熟悉的……桃井粉色的瞳孔猛然紧缩，光环也跳动一下。一天半天地狱般的经历让她不想再呆在这个世界，她下意识却不可置信地，像是在问眼前的陌生人，也像是在问自己地讲道：“老师？”随之，她不受控制地将泪水倾泻而下，一个猛扑死死保住卡尔达舍夫的腰。\n\n两个护送的专人面面相觑。他们没想到这个女孩整这么一出。卡尔达舍夫也被吓了一跳，他听不懂日语，只能感受到她刚刚叫声中的悲哀，或许是把自己当成她的亲人了？他轻叹一口气：“孩子，我可不是你的家人”。陌生的俄语将才羽桃井拉了回来。她抬头，才发现了那和老师完全不一样的东欧面孔。“噫！”桃井松开手，迅速后跳半步，“对对对对不起！”卡尔达舍夫看着眼前慌乱的孩子，只得浅浅苦笑一声。"
 momoi.13.a:0 "这孩子精神状态可能不怎么样……"
 momoi.14.t:0 "新家(2)"
 momoi.14.d:0 "桃井被卡尔达舍夫家杂乱的仪器整得眼花缭乱。她曾以为只有研讨会或者工程部的人才能整出这么多玩意。尽管仪器相较于千禧年十分简陋，好奇心仍然在少女的心中升起。“这算是寻宝吗？嘿嘿。”她自言自语着。她在窗边发现了一根长长的望远镜，这个望眼镜对准了太阳，镜口放了一面“铝箔纸”。这种望远镜她仅仅在工程部见过。好奇心驱使她拿下那张“纸”，想把眼睛凑到目镜上……\n\n“呜哇！”卡尔达舍夫忽然抓住才羽桃井的大衣帽子，把她拉到一旁，他时刻在旁边关注着她，要是她把眼睛对准了没放巴德膜又对准了太阳的望远镜……他可不想用这种魔鬼的方式测试光环的防御能力。才羽桃井被这么一吓，立马收敛了许多。或许还是有什么误会，才羽桃井以为是卡尔达舍夫不想让他碰望远镜，又从而“推理”出那个天文望远镜是碰不得的东西，参观的流程也顿时尴尬了起来。\n\n卡尔达舍夫把才羽桃井带到了他提前收拾好的房间。政府要求他“在工作之余记得照顾好这个女孩”。他心想他自己一个科学家怎么带孩子啊，还有政府怎么对这个日裔女孩子这么照顾啊。他回过头，看着正在玩弄摆在床上洋娃娃的桃井，默默苦笑一声，返回仪器堆，翻出纸笔,心想："
 momoi.14.a:0 "接下来的日子不太安宁咯……"
 momoi.14.tt:0 "§Y科米政治动荡-才羽桃井解锁新决议§!"
 momoi.15.t:0 "暗影里的计划"
 momoi.15.d:0 "“上帝的叛徒！败类！异端！无能的伪天使！”谢尔盖·塔博里茨基在教堂边的平整草地向他的组织成员们激动地演讲着。“我上午接到我们右翼准军事组织情报的消息，左派接过来了一个带着光环的日裔女子。”随后，塔博里茨基翻出了一张报告，以及准军事组织发来的一张照片。他将照片向台下的众人展示了一番，便用力的将照片撕成碎渣。\n\n“带着光环？呵呵。这个所谓的天使不过是空有其表，不过是带了个光环的废物！拥有超出常人的力量却被军队俘虏，能够打下飞机却留下了心理阴影，甚至需要那群赤色分子的保护。这是对真正的上帝与阿列克谢皇储的亵渎，是伪上帝派来扰乱我们信众虔诚之心的！她是犹太分子的伪装！她是我们帝俄复兴协会的敌人！真正的上帝永远站在我们这一边！我们不会因为这个伪天使而放弃复兴帝俄的战斗，阿列克谢皇储才是我们真正的领袖！”\n\n台下狂热的人们爆发出热烈的掌声，举起拳头高呼“塔博里茨基万岁！上帝万岁！”而塔博里茨基在胸前比了个十字，后望向天空：“皇子，我早已听见你的旨意。我，受祝摄政，将为您扫清一切障碍和绯闻，将福音带回俄罗斯……”塔博里茨基用颤抖的声音低语着。"
 momoi.15.a:0 "一群疯子……"
 momoi.15.tt:0 "§j右派开始行动了……§!"
 momoi_dynamic_modifier:0 "异界来客"