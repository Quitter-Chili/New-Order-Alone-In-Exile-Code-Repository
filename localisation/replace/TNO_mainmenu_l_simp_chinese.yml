 TNO_ugly_american_icon_tt_delayed:0 "又是一年寒冬，§W俄§!§z罗§!§x斯§!的厚雪一如既往压得人喘不过气。§j欧洲之主§!的铁骑碾过克里姆林宫的历史已经过了二十来年，将§W俄§!§z罗§!§x斯§!从世界地图的顶端挑落谷底，叫她的尸体蒙上死寂的尘灰。她的人民两次反抗，两度惨败，自己狼烟不止，征战未休。从马加丹港口稀落的游船到北德维纳河畔喧嚣的议会，自鄂木斯克深林间或的枪响抵奥莫隆教堂悲怮的倾诉，而留给这片古老土地的人民的貌似只有§e血淋淋的命运。§!\n\n1962年元旦，不期而至的孤星掠过§W俄§!§z罗§!§x斯§!的天空，独在异乡的§C勇者§!尚不知因何而来，从何而去，便被卷入瑟克特夫卡尔议会的暗黑之中。幸而仰望星空的§R星币首位§!把她接下，带着她走过刀光剑影的新手教程。而当勇者了解完这个世界的背景故事，她不语，只是举起长剑，誓将寒光刺向§j西边的魔王§!，带着这个绝望的国度迈入光明的田野。\n\n但纵使是§C勇者§!，也会有自己的心事。因何而来？从何而去？她为了自己给自己设下的任务而将幼稚的自己埋葬在心中。当§K色诺芬§!在伯罗奔尼撒与小亚细亚驰骋疆场时，是否回忆的起他同§W苏格拉底§!和§B柏拉图§!畅谈的时光？是否会回忆起雅典的海风？\n\n§x随着夜色降临，她望向窗外，任由漆黑的夜吞噬她晶莹的泪……§!"
 
